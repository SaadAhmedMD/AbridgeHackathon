<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TRANSFER — bed arbitrage platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e9efed; --panel:#ffffff; --panel2:#f6faf8; --panel3:#eef4f2;
    --ink:#0e211e; --ink2:#3a534e; --muted:#6b827d; --faint:#9bafaa;
    --line:#d7e3df; --line2:#e6efec;
    --teal:#0f6e63; --teal2:#12857a; --tealsoft:#e0efeb; --tealink:#0a4a43;
    --money:#1c7a4c; --moneysoft:#e0f0e7;
    --burn:#b23a28; --burnsoft:#f6e3de;
    --amber:#a9741a; --ambersoft:#f4ecdd;
    --agentbg:#0b1917; --agentbg2:#122421; --agentline:#1e3a35;
    --accent:#35d0b8;
    --sans:'IBM Plex Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --serif:'IBM Plex Serif',Georgia,serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:var(--teal);text-decoration:none}
  a:hover{color:var(--teal2)}
  button{font-family:var(--sans)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#c2d2cd;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(220%)}}
  @keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes flashrow{0%{background:var(--moneysoft)}100%{background:transparent}}
  .bp{position:relative}
  .bp::before,.bp::after{content:"";position:absolute;width:10px;height:10px;pointer-events:none;opacity:.55}
  .bp::before{top:7px;left:7px;border-top:1.5px solid var(--teal);border-left:1.5px solid var(--teal)}
  .bp::after{bottom:7px;right:7px;border-bottom:1.5px solid var(--teal);border-right:1.5px solid var(--teal)}
  .rise{animation:rise .38s ease both}
  .flash{animation:flashrow 1.6s ease both}
  .memo-sec{animation:rise .5s ease both}
  sup[data-tip]{color:var(--teal);cursor:help;position:relative;font-weight:600}
  #tooltip{position:fixed;z-index:99;max-width:320px;background:var(--agentbg);color:#dbeeea;font:400 11.5px var(--sans);line-height:1.5;padding:9px 12px;border-radius:9px;border:1px solid var(--agentline);box-shadow:0 10px 30px rgba(6,17,15,.35);pointer-events:none;display:none}
  #tooltip .src{font-family:var(--mono);font-size:10px;color:var(--accent);margin-top:5px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;background:var(--agentbg);color:#eaf4f1;font:500 12.5px var(--sans);padding:11px 18px;border-radius:10px;border:1px solid var(--agentline);box-shadow:0 12px 34px rgba(6,17,15,.4);display:flex;align-items:center;gap:9px;animation:rise .3s ease both}
  input[type=range]{accent-color:var(--teal)}
  @media print{
    body *{visibility:hidden}
    #memo-print,#memo-print *{visibility:visible}
    #memo-print{position:absolute;left:0;top:0;width:100%}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="tooltip"></div>
<script src="js/data.js"></script>
<script src="js/tools.js"></script>
<script src="js/agent.js"></script>
<script src="js/app.js"></script>
</body>
</html>
